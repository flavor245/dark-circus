<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Dark Circus</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        /* --- [기본 세팅] --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #050505; /* 아주 깊은 검정색 */
            color: #dcdcdc; /* 낡은 은색 느낌의 텍스트 */
            font-family: 'Noto Sans KR', sans-serif;
            overflow-x: hidden;
        }

        a { text-decoration: none; color: inherit; transition: 0.3s; }
        ul { list-style: none; }

        /* --- [배경 효과] --- */
        .bg-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            
            background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)),
                        url('bg01.jpg'); 

            background-size: cover;    /* 이미지가 화면을 꽉 채우게 */
            background-position: center; /* 이미지의 가운데를 보여주게 */
            
            z-index: -1;
            pointer-events: none;
        }
        /* --- [네비게이션 바] --- */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 50px;
            position: fixed;
            width: 100%;
            z-index: 100;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1); /* 희미한 선 */
            backdrop-filter: blur(5px);
        }

        .logo {
            font-family: 'Cinzel', serif;
            font-size: 1.2rem;
            letter-spacing: 2px;
            color: #fff;
        }

        .menu {
            display: flex;
            gap: 40px;
        }

        .menu li a {
            font-family: 'Cinzel', serif;
            font-size: 0.9rem;
            opacity: 0.6;
            letter-spacing: 1px;
        }

        .menu li a:hover {
            opacity: 1;
            color: #fff;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5); /* 네온 효과 */
        }

        /* --- [메인 타이틀 화면] --- */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: relative;
        }

        .main-title {
            font-family: 'Cinzel', serif;
            font-size: 4rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 20px;
            letter-spacing: 10px;
            text-transform: uppercase;
            /* 텍스트에 약간의 질감 느낌 주기 */
            background: linear-gradient(to bottom, #fff 0%, #888 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 20px rgba(255, 255, 255, 0.1));
        }

        .sub-title {
            font-size: 1rem;
            opacity: 0.7;
            margin-bottom: 60px;
            font-weight: 300;
            letter-spacing: 3px;
        }

        /* --- [게임 시작 버튼 스타일] --- */
        .start-btn {
            padding: 15px 40px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            letter-spacing: 3px;
            position: relative;
            overflow: hidden;
            background: transparent;
            cursor: pointer;
            color: #fff;
        }

        /* 버튼 장식 (모서리 디테일) */
        .start-btn::before {
            content: '';
            position: absolute;
            top: 2px; left: 2px; right: 2px; bottom: 2px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            pointer-events: none;
        }

        .start-btn:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: #fff;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
        }

        /* --- [반응형 (모바일)] --- */
        @media (max-width: 768px) {
            .main-title { font-size: 2.5rem; letter-spacing: 5px; }
            nav { padding: 20px; }
            .menu { display: none; } /* 모바일 메뉴는 일단 숨김 */
        }
    </style>
</head>
<body>

    <div class="bg-overlay"></div>

    <nav>
        <div class="logo">† PHANTASMAGORIA</div>
        <ul class="menu">
            <li><a href="index.html">HOME</a></li> 
            <li><a href="worldview.html">WORLDVIEW</a></li>
            <li><a href="profiles.html">PROFILES</a></li> 
            <li><a href="hidden.html">???</a></li>
        </ul>
    </nav>

    <section class="hero">
        <h1 class="main-title">ABYSS CARNIVAL</h1>
        <p class="sub-title">Enter the void, sign the contract.</p>
        
        <a href="https://ko.cvdk.io/c/4_47_z0iSWGHEs6GP2EdSg?rc=UQYoLHcorm" class="start-btn">ENTER WORLD</a>
    </section>

</body>
</html>
